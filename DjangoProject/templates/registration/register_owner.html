{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Регистрация владельца</h1>
                <p class="text-secondary small mb-3">Доступно только для первичного запуска системы.</p>
                <form method="post" class="d-grid gap-3">
                    {% csrf_token %}
                    {% for field in form %}
                        <div>
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-person-plus me-1"></i> Создать владельца
                    </button>
                </form>
                <div class="mt-3 small">
                    <a href="{% url 'login' %}">Назад ко входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
