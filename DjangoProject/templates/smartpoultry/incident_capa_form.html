{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">CAPA по инциденту #{{ incident.id }}</h1>
    <a class="btn btn-outline-secondary btn-sm" href="{% url 'incidents_list' %}">Назад к инцидентам</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <div class="mb-3">
            <div><strong>{{ incident.title }}</strong></div>
            <div class="text-secondary">{{ incident.message }}</div>
        </div>
        <form method="post" class="d-grid gap-3">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button class="btn btn-primary" type="submit">Сохранить CAPA</button>
        </form>
    </div>
</div>
{% endblock %}
