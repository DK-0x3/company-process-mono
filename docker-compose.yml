name: company-process

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-company_process}
      POSTGRES_USER: ${POSTGRES_USER:-company_process}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-company_process} -d ${POSTGRES_DB:-company_process}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./company-process-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-company_process}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-company_process}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,https://localhost}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./company-process-frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  django:
    build:
      context: ./DjangoProject
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-1}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-1}
      SQLITE_PATH: /app/runtime/db.sqlite3
    volumes:
      - django_runtime:/app/runtime
      - django_reports:/app/generated_reports
    command:
      - sh
      - -c
      - python manage.py migrate && python manage.py collectstatic --noinput && exec gunicorn DjangoProject.wsgi:application --bind 0.0.0.0:8000 --workers ${DJANGO_GUNICORN_WORKERS:-3} --timeout 120 --access-logfile - --error-logfile -
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      DJANGO_DOMAIN: ${DJANGO_DOMAIN:-django.localhost}
    depends_on:
      - frontend
      - django
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  django_runtime:
  django_reports:
  caddy_data:
  caddy_config:
